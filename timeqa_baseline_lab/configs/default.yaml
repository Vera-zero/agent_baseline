# Core paths
data:
  # New unified format (recommended)
  unified_data_path: "/workspace/ETE-Graph/dataset/timeqa/test_ffinal.json"
  dataset_type: ""  # Leave empty for auto-detection, or specify 'timeqa' or 'tempreason'

  # Legacy format (for backward compatibility, will be ignored if unified_data_path is set)
  corpus_path: ""
  question_arrow_path: ""

# Model config (local / remote / vllm / deepseek, choose one by provider)
model:
  provider: "vllm"        # local / remote / vllm / deepseek

  # ----- local provider (HuggingFace transformers) -----
  # model_name: "Qwen/Qwen3-4B-Instruct-2507"
  # device: "auto"           # auto / cpu / cuda
  # torch_dtype: "auto"      # auto / float16 / bfloat16 / float32

  # ----- vllm provider (local VLLM service) -----
  model_name: "qwen3-32b"
  base_url: "http://localhost:8000/v1"

  # ----- remote provider (OpenAI-compatible Chat Completions) -----
  model: "deepseek-chat"
  # base_url: "https://api.deepseek.com/chat/completions"
  api_key_env: "DEEPSEEK_API_KEY"

  # ----- deepseek provider (DeepSeek API) -----
  # provider: "deepseek"
  # model: "deepseek-chat"
  # base_url: "https://api.deepseek.com/chat/completions"
  # api_key_env: "DEEPSEEK_API_KEY"
  # Note: Set environment variable DEEPSEEK_API_KEY before running
  # Example: export DEEPSEEK_API_KEY="your-api-key-here"

  # common generation config
  max_new_tokens: 4096
  temperature: 0.0
  max_retries: 3
  timeout: 180

  # batch across questions for non-interactive strategies only
  # interactive strategies (react/qaap) force batch_size=1 automatically
  batch_size: 4

# Retriever config
retriever:
  type: "bgem3"            # Options: "contriever" or "bgem3" (默认使用 bgem3)

  # ----- for contriever -----
  model_name: "/workspace/models/contriever"  # Use local contriever model

  # ----- for bgem3 -----
  model_path: "/workspace/models/bge-m3"
  device: "auto"           # auto / cpu / cuda (for bgem3)
  use_fp16: false          # set true for GPU acceleration (for bgem3)

  # common config
  top_k: 10

# Chunk config (token based)
chunk:
  chunk_size: 200
  chunk_overlap: 50
  min_chunk_size: 50

# Runtime config
run:
  strategy: "zero_shot_cot"      # zero_shot / zero_shot_cot / rag_cot / react / qaap
  max_questions: 0           # set <=0 for full set
  resume: true
  save_every: 1
  seed: 42
  load_strategy_config: true
  strategy_config_dir: "./configs/methods"
  strategy_params: {}          # will be overridden by configs/methods/<strategy>.yaml

# Caches and outputs
io:
  cache_dir: "./cache"
  output_dir: "./outputs"
  run_name: "timeqa_baseline"